
name: Build Kernel Mi 9 (cepheus)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Download Clang Compiler
      run: |
        mkdir clang
        cd clang
        curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r450784d.tar.gz
        tar -xf clang-r450784d.tar.gz

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 -b thirteen https://github.com/Spark-Devices/android_kernel_xiaomi_cepheus kernel
        
    - name: Inject KALLSYMS Config
      run: |
        cd kernel
        # Menambahkan config langsung ke defconfig utama target sebelum di-compile
        # Catatan: ganti 'cepheus_defconfig' jika nama file defconfig di reponya berbeda
        DEFCONFIG_PATH="arch/arm64/configs/vendor/cepheus_defconfig"
        
        echo "CONFIG_KALLSYMS=y" >> $DEFCONFIG_PATH
        echo "CONFIG_KALLSYMS_ALL=y" >> $DEFCONFIG_PATH
        
        echo "=== HASIL INJEKSI CONFIG ==="
        tail -n 5 $DEFCONFIG_PATH

    - name: Compile Kernel
      run: |
        cd kernel
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        
        # 1. Generate config awal
        make O=out vendor/cepheus_defconfig
        
        # 2. Proses Kompilasi kernel
        make -j$(nproc --all) O=out \
          CC=clang \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi-

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Image.gz-dtb-cepheus
        path: kernel/out/arch/arm64/boot/Image.gz-dtb
