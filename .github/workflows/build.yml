name: Build Kernel Mi 9 (cepheus)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # =========================
    # 1. ENV SETUP
    # =========================
    - name: Setup Build Environment
      run: |
        sudo apt update
        sudo apt install -y bc bison flex libssl-dev libelf-dev build-essential git curl zip python3 gcc-aarch64-linux-gnu
        sudo apt install -y gcc-arm-linux-gnueabi
        sudo apt install -y libyaml-dev
        
    # =========================
    # 2. CLONE CLANG (FIXED)
    # =========================
    - name: Clone Clang Toolchain
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git $HOME/proton
          
    # =========================
    # 3. CLONE KERNEL
    # =========================
    - name: Clone Kernel Source
      run: |
        git clone --depth=1 -b pyro \
          https://github.com/Spark-Devices/android_kernel_xiaomi_cepheus kernel

    # =========================
    # 4. CONFIG INJECTION (APATCH READY)
    # =========================
    - name: Inject Kernel Config (KALLSYMS)
      run: |
        cd kernel

        scripts/config --file arch/arm64/configs/cepheus_defconfig \
          -e KALLSYMS \
          -e KALLSYMS_ALL \
          -e KALLSYMS_BASE_RELATIVE \
          -e FTRACE \
          -e FUNCTION_TRACER \
          -e DYNAMIC_FTRACE \
          -e KPROBES \
          -e KPROBE_EVENTS \
          -e DEBUG_INFO

    # =========================
    # 5. BUILD KERNEL (FIXED TOOLCHAIN)
    # =========================
    - name: Compile Kernel
      run: |
        export PATH="$HOME/proton/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang
        export LD=ld.lld
        
        sudo apt-get install -y libyaml-dev
        make O=out mrproper
        make O=out ARCH=arm64 olddefconfig
        make -j$(nproc) O=out ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCC=gcc \
            HOSTCXX=g++ \
            HOSTLD=ld \
            Image.gz-dtb dtbo.img 2>&1 | tee build.log
            
    - name: Build AnyKernel3 Flashable Zip
      run: |
        mkdir -p anykernel

        # clone AnyKernel3
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel

        cd anykernel

        # =========================
        # COPY KERNEL IMAGE
        # =========================
        cp ../kernel/out/arch/arm64/boot/Image.gz-dtb zImage

        # =========================
        # OPTIONAL DEVICE CONFIG
        # =========================
        sed -i 's/device.name=.*/device.name=cepheus/' anykernel.sh || true

        # =========================
        # CLEAN PACKAGING
        # =========================
        zip -r9 boot.img.zip . -x "*.git*" README.md

        mv boot.img.zip ../boot-img-cepheus.zip

    # =========================
    # 6. UPLOAD RESULT (KERNEL ONLY FIRST)
    # =========================
    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Image-gz-dtb-cepheus
        path: kernel/out/arch/arm64/boot/Image.gz-dtb
