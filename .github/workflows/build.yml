name: Build Kernel Mi 9 (cepheus)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # =========================
    # 1. ENV SETUP
    # =========================
    - name: Setup Build Environment
      run: |
        sudo apt update
        sudo apt install -y bc bison flex libssl-dev libelf-dev build-essential git curl zip python3 gcc-aarch64-linux-gnu
        sudo apt install -y gcc-arm-linux-gnueabi
        sudo apt install -y libyaml-dev
        
    # =========================
    # 2. CLONE CLANG (FIXED)
    # =========================
    - name: Clone Clang Toolchain
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git $HOME/proton
          
    # =========================
    # 3. CLONE KERNEL
    # =========================
    - name: Clone Kernel Source
      run: |
        git clone --depth=1 -b pyro \
          https://github.com/Spark-Devices/android_kernel_xiaomi_cepheus kernel

    # =========================
    # 4. CONFIG INJECTION (APATCH READY)
    # =========================
    - name: Inject Kernel Config (KALLSYMS)
      run: |
        echo "CONFIG_KALLSYMS=y" >> kernel/arch/arm64/configs/cepheus_defconfig
        echo "CONFIG_KALLSYMS_ALL=y" >> kernel/arch/arm64/configs/cepheus_defconfig
        echo "CONFIG_KALLSYMS_BASE_RELATIVE=y" >> kernel/arch/arm64/configs/cepheus_defconfig
        echo "CONFIG_FTRACE=y" >> kernel/arch/arm64/configs/cepheus_defconfig
        echo "CONFIG_FUNCTION_TRACER=y" >> kernel/arch/arm64/configs/cepheus_defconfig
        echo "CONFIG_DYNAMIC_FTRACE=y" >> kernel/arch/arm64/configs/cepheus_defconfig
        echo "CONFIG_KPROBES=y" >> kernel/arch/arm64/configs/cepheus_defconfig
        echo "CONFIG_KPROBE_EVENTS=y" >> kernel/arch/arm64/configs/cepheus_defconfig
        echo "CONFIG_DEBUG_INFO=y" >> kernel/arch/arm64/configs/cepheus_defconfig
        
    # =========================
    # 5. BUILD KERNEL (FIXED TOOLCHAIN)
    # =========================
    - name: Compile Kernel
      run: |
        export KERNEL_DIR=$PWD/kernel
        export CLANG_PATH=$PWD/clang
        export PATH=$CLANG_PATH/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CC=clang
        export LD=ld.lld

        cd &KERNEL_DIR
        make O=out cepheus_defconfig
        make -j$(nproc --all) O=out \
          CC=clang \
          LLVM=1 \
          LLVM_IAS=1
            
    - name: Build AnyKernel3 Flashable Zip
      run: |
        mkdir -p anykernel

        # clone AnyKernel3
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel

        cd anykernel

        # =========================
        # COPY KERNEL IMAGE
        # =========================
        cp ../kernel/out/arch/arm64/boot/Image.gz-dtb zImage

        # =========================
        # OPTIONAL DEVICE CONFIG
        # =========================
        sed -i 's/device.name=.*/device.name=cepheus/' anykernel.sh || true

        # =========================
        # CLEAN PACKAGING
        # =========================
        zip -r9 boot.img.zip . -x "*.git*" README.md

        mv boot.img.zip ../boot-img-cepheus.zip

    # =========================
    # 6. UPLOAD RESULT (KERNEL ONLY FIRST)
    # =========================
    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Image-gz-dtb-cepheus
        path: kernel/out/arch/arm64/boot/Image.gz-dtb
