name: Build TURTLE-APatch (cepheus)

on:
  workflow_dispatch:
    inputs:
      defconfig:
        description: "Nama defconfig yang dipakai (contoh: cepheus_defconfig)"
        required: true
        default: "cepheus_defconfig"

env:
  KERNEL_DIR: ${{ github.workspace }}/kernel
  OUT_DIR: ${{ github.workspace }}/out
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo ini (script + workflow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main

      - name: Clone kernel source cepheus (branch bersih, tanpa KSUN/SUSFS)
        run: |
          git clone --depth=1 -b pyro \
            https://github.com/Spark-Devices/android_kernel_xiaomi_cepheus \
            "${KERNEL_DIR}"

      - name: Setup build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libncurses-dev \
            build-essential python3 python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            device-tree-compiler cpio rsync \
            libyaml-dev pkg-config

      - name: Clone Proton Clang
        run: git clone --depth=1 https://github.com/kdrag0n/proton-clang.git "${HOME}/proton"

      - name: Patch defconfig untuk APatch (CONFIG_KALLSYMS_ALL dkk)
        run: |
          python3 "${{ github.workspace }}/.github/scripts/patch_defconfig_apatch.py" \
            "${KERNEL_DIR}/arch/arm64/configs/${{ github.event.inputs.defconfig }}"

      - name: Verifikasi config kritikal sebelum build
        run: |
          CFG="${KERNEL_DIR}/arch/arm64/configs/${{ github.event.inputs.defconfig }}"
          echo "== Cek config penting =="
          for c in CONFIG_KALLSYMS CONFIG_KALLSYMS_ALL CONFIG_MODULES; do
            grep -E "^${c}=" "$CFG" || { echo "GAGAL: $c tidak ter-set"; exit 1; }
          done

      - name: Perbaiki bug penamaan variable di scripts/dtc/Makefile (HOSTLDLIBS_dtc -> HOSTLOADLIBES_dtc)
        run: |
          DTC_MK="${KERNEL_DIR}/scripts/dtc/Makefile"
          echo "== Sebelum patch =="
          grep -n yaml "$DTC_MK" || true
          sed -i 's/HOSTLDLIBS_dtc/HOSTLOADLIBES_dtc/' "$DTC_MK"
          echo "== Sesudah patch =="
          grep -n yaml "$DTC_MK" || true

      - name: Alias python2 ke python3 (mkdtboimg.py kompatibel python3)
        run: |
          sudo ln -sf "$(command -v python3)" /usr/local/bin/python2
          sed -i 's/xrange(/range(/g' "${KERNEL_DIR}/scripts/dtc/mkdtboimg.py"

      - name: Build kernel
        run: |
          cd "${KERNEL_DIR}"
          export PATH="${PATH}:${HOME}/proton/bin"
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export HOSTCC=gcc
          export HOSTCXX=g++
          export HOSTLD=ld
          make O="${OUT_DIR}" ARCH=arm64 ${{ github.event.inputs.defconfig }}
          make O="${OUT_DIR}" ARCH=arm64 -j$(nproc)

      - name: Package boot.img (AnyKernel3)
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 "${{ github.workspace }}/AnyKernel3"
          cp "${OUT_DIR}/arch/arm64/boot/Image.gz-dtb" "${{ github.workspace }}/AnyKernel3/" || \
          cp "${OUT_DIR}/arch/arm64/boot/Image" "${{ github.workspace }}/AnyKernel3/"
          cd "${{ github.workspace }}/AnyKernel3"
          zip -r9 ../TURTLE-APatch-cepheus.zip . -x .git README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TURTLE-APatch-cepheus
          path: TURTLE-APatch-cepheus.zip
