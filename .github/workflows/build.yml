name: Build Kernel Mi 9 (cepheus)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # =========================
    # 1. ENV SETUP
    # =========================
    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex git \
          libssl-dev libelf-dev libncurses5-dev zip \
          libyaml-dev pkg-config
    # =========================
    # 2. CLONE CLANG (FIXED)
    # =========================
    - name: Clone Clang Toolchain
      run: |
        mkdir -p $HOME/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz -C $HOME/clang
          echo "$HOME/clang/bin" >> $GITHUB_PATH

    # =========================
    # 3. CLONE KERNEL
    # =========================
    - name: Clone Kernel Source
      run: |
        git clone --depth=1 -b pyro \
          https://github.com/Spark-Devices/android_kernel_xiaomi_cepheus kernel

    # =========================
    # 4. CONFIG INJECTION (APATCH READY)
    # =========================
    - name: Inject Kernel Config (KALLSYMS)
      run: |
        cd kernel

        DEFCONFIG=arch/arm64/configs/cepheus_defconfig

        echo "" >> $DEFCONFIG
        echo "# Apatch / Debug support" >> $DEFCONFIG
        echo "CONFIG_KALLSYMS=y" >> $DEFCONFIG
        echo "CONFIG_KALLSYMS_ALL=y" >> $DEFCONFIG
        echo "CONFIG_KALLSYMS_BASE_RELATIVE=y" >> $DEFCONFIG

        echo "=== LAST CONFIG PATCH ==="
        tail -n 10 $DEFCONFIG

    # =========================
    # 5. BUILD KERNEL (FIXED TOOLCHAIN)
    # =========================
    - name: Compile Kernel
      run: |
        export KERNEL_DIR=$PWD/kernel
        export CLANG_PATH=$PWD/clang
        export PATH=$CLANG_PATH/bin:$PATH

        export ARCH=arm64
        export SUBARCH=arm64
        export LLVM=1
        export LLVM_IAS=1

        # Fix DTC yaml
          sed -i 's/yamltree\.o//' scripts/dtc/Makefile
          sed -i '/dt_to_yaml/c\			/* yaml output disabled */' scripts/dtc/dtc.c
          echo 'void dt_to_yaml(void *dti, void *f) {}' >> scripts/dtc/yamltree.c

        cd $KERNEL_DIR
        make O=out mrproper
        make O=out cepheus_defconfig

        make -j$(nproc --all) O=out \
          CC=clang \
          LLVM=1 \
          LLVM_IAS=1

    # =========================
    # 6. UPLOAD RESULT (KERNEL ONLY FIRST)
    # =========================
    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Image-gz-dtb-cepheus
        path: kernel/out/arch/arm64/boot/Image.gz-dtb
